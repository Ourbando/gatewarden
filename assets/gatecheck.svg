  <!-- pipe end ports -->
  <rect x="0" y="19" width="3" height="6" fill="#565e70"/>
  <rect x="197" y="19" width="3" height="6" fill="#565e70"/>
  <!-- labels -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" paint-order="stroke" stroke="#0d1426" stroke-width="0.7" stroke-linejoin="round">
    <text x="96.5" y="6.5" text-anchor="middle" font-size="3.6" font-weight="600" fill="#ced8e8">Signed, tamper-evident log</text>
    <text x="6" y="18" font-size="3.1" fill="#96a0b4">proposes an action</text>
    <text x="22" y="43" text-anchor="middle" font-size="3.6" font-weight="600" fill="#ced8e8">Untrusted AI agent</text>
    <text x="92" y="18" text-anchor="end" font-size="3.6" font-weight="600" fill="#ced8e8">Deterministic gate</text>
    <text x="133" y="18" font-size="3.6" font-weight="600"><tspan font-size="3.1" font-weight="400" fill="#96a0b4">allow </tspan><tspan fill="#68ba6e">Runs</tspan></text>
    <text x="96.5" y="40" text-anchor="middle" font-size="3.6" font-weight="600"><tspan font-size="3.1" font-weight="400" fill="#96a0b4">block </tspan><tspan fill="#d94f4f">Refused</tspan></text>
