      <rect x="43" y="16" width="3" height="1" fill="#79d595"/>
      <rect x="43" y="11" width="3" height="3" fill="#a9edbf"/>
    </g>
    <g class="gRed">
      <rect x="40" y="9" width="9" height="8" fill="#d94f4f" filter="url(#bloom)" opacity="0.5"/>
      <rect x="43" y="9" width="3" height="1" fill="#7c2d36"/>
      <rect x="42" y="10" width="5" height="1" fill="#7c2d36"/>
      <rect x="41" y="11" width="7" height="1" fill="#7c2d36"/>
      <rect x="40" y="12" width="9" height="2" fill="#7c2d36"/>
      <rect x="41" y="14" width="7" height="1" fill="#7c2d36"/>
      <rect x="42" y="15" width="5" height="1" fill="#7c2d36"/>
      <rect x="43" y="16" width="3" height="1" fill="#7c2d36"/>
      <rect x="43" y="11" width="3" height="3" fill="#d94f4f"/>
    </g>
    <rect x="66" y="8" width="12" height="1" fill="#68ba6e"/>
    <rect x="66" y="17" width="12" height="1" fill="#68ba6e"/>
    <rect x="66" y="9" width="1" height="2" fill="#68ba6e"/>
    <rect x="77" y="9" width="1" height="2" fill="#68ba6e"/>
    <rect x="66" y="15" width="1" height="2" fill="#68ba6e"/>
    <rect x="77" y="15" width="1" height="2" fill="#68ba6e"/>
    <g class="chamber">
