      <rect x="43" y="16" width="3" height="1" fill="#2c3240"/>
      <rect x="43" y="11" width="3" height="3" fill="#327a42"/>
    </g>
    <g class="gGreen">
      <rect x="40" y="9" width="9" height="8" fill="#79d595" filter="url(#bloom)" opacity="0.55"/>
      <rect x="43" y="9" width="3" height="1" fill="#79d595"/>
      <rect x="42" y="10" width="5" height="1" fill="#79d595"/>
      <rect x="41" y="11" width="7" height="1" fill="#79d595"/>
