  <rect x="17" y="30" width="7" height="4" fill="#111d3a"/>
  <g class="bitA"><rect x="18" y="31" width="1" height="1" fill="#79d595"/><rect x="21" y="32" width="1" height="1" fill="#a9edbf"/></g>
  <g class="bitB"><rect x="20" y="31" width="1" height="1" fill="#a9edbf"/><rect x="19" y="32" width="1" height="1" fill="#79d595"/></g>
  <rect x="26" y="30" width="1" height="1" fill="#327a42"/>
  <g class="lamp"><rect x="26" y="30" width="1" height="1" fill="#79d595"/></g>
  <rect x="17" y="35" width="10" height="1" fill="#111d3a"/>
  <rect x="15" y="38" width="3" height="1" fill="#565e70"/>
  <rect x="26" y="38" width="3" height="1" fill="#565e70"/>
  <!-- the original scene, untouched, on the bigger stage -->
  <g transform="translate(52,9)">
    <rect x="37" y="0" width="15" height="6" fill="#565e70"/>
    <rect x="38" y="1" width="13" height="4" fill="#2c3240"/>
    <rect x="40" y="2" width="9" height="2" fill="#1a4228"/>
    <g class="sA1"><rect x="41" y="2" width="2" height="2" fill="#a9edbf"/></g>
    <g class="sA2"><rect x="41" y="2" width="2" height="2" fill="#79d595"/></g>
    <g class="sB1"><rect x="44" y="2" width="2" height="2" fill="#a9edbf"/></g>
    <g class="sB2"><rect x="44" y="2" width="2" height="2" fill="#79d595"/></g>
    <g class="sC1"><rect x="47" y="2" width="2" height="2" fill="#d94f4f"/></g>
    <g class="sC2"><rect x="47" y="2" width="2" height="2" fill="#7c2d36"/></g>
    <rect x="44" y="6" width="1" height="2" fill="#565e70"/>
    <g class="streak"><rect x="44" y="6" width="1" height="2" fill="#a9edbf"/></g>
    <rect x="67" y="9" width="10" height="8" fill="#1a4228"/>
    <rect x="0" y="11" width="38" height="1" fill="#96a0b4"/>
    <rect x="0" y="12" width="38" height="2" fill="#111d3a"/>
    <rect x="0" y="14" width="38" height="1" fill="#2c3240"/>
    <rect x="50" y="11" width="46" height="1" fill="#96a0b4"/>
    <rect x="50" y="12" width="46" height="2" fill="#111d3a"/>
    <rect x="50" y="14" width="46" height="1" fill="#2c3240"/>
    <g>
      <rect x="44" y="6" width="1" height="1" fill="#96a0b4"/>
      <rect x="43" y="7" width="3" height="1" fill="#96a0b4"/>
      <rect x="42" y="8" width="5" height="1" fill="#96a0b4"/>
      <rect x="41" y="9" width="7" height="1" fill="#96a0b4"/>
      <rect x="40" y="10" width="9" height="1" fill="#96a0b4"/>
      <rect x="39" y="11" width="11" height="1" fill="#96a0b4"/>
      <rect x="38" y="12" width="13" height="2" fill="#96a0b4"/>
      <rect x="39" y="14" width="11" height="1" fill="#96a0b4"/>
      <rect x="40" y="15" width="9" height="1" fill="#96a0b4"/>
      <rect x="41" y="16" width="7" height="1" fill="#96a0b4"/>
      <rect x="42" y="17" width="5" height="1" fill="#96a0b4"/>
      <rect x="43" y="18" width="3" height="1" fill="#96a0b4"/>
