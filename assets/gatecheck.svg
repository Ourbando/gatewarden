<svg xmlns="http://www.w3.org/2000/svg" width="760" height="175" viewBox="0 0 200 46" shape-rendering="crispEdges" role="img" aria-labelledby="gcT gcD">
  <title id="gcT">The gate, checked</title>
  <desc id="gcD">An untrusted AI agent console emits proposal pulses up a feeder pipe into the main line and through the deterministic gate. Allowed pulses run on through the green chamber while a streak seals the signed, tamper-evident log in the vault. Blocked pulses are refused, dropping into the red drain.</desc>
  <style>
    .pA { animation: pa 18s linear infinite; }
    @keyframes pa {
      0%   { transform: translate(-34px, 9px); opacity: 1; }
      4%   { transform: translate(-34px, 0); opacity: 1; }
      18.667% { transform: translate(40px, 0); opacity: 1; }
      22%  { transform: translate(44px, 0); opacity: 1; }
      38.667% { transform: translate(148px, 0); opacity: 1; }
      39%, 100% { transform: translate(148px, 0); opacity: 0; }
    }
    .pB { animation: pb 18s linear infinite; }
    @keyframes pb {
      0%, 30% { transform: translate(-34px, 9px); opacity: 0; }
      30.1% { transform: translate(-34px, 9px); opacity: 1; }
      34%  { transform: translate(-34px, 0); opacity: 1; }
      48.667% { transform: translate(40px, 0); opacity: 1; }
      52%  { transform: translate(44px, 0); opacity: 1; }
      68.667% { transform: translate(148px, 0); opacity: 1; }
      69%, 100% { transform: translate(148px, 0); opacity: 0; }
    }
    .pC { animation: pc 18s linear infinite; }
    @keyframes pc {
      0%, 60% { transform: translate(-34px, 9px); opacity: 0; }
      60.1% { transform: translate(-34px, 9px); opacity: 1; }
      64%  { transform: translate(-34px, 0); opacity: 1; }
      78.667% { transform: translate(40px, 0); opacity: 1; }
      82%  { transform: translate(40px, 0); opacity: 1; }
      82.5%, 100% { transform: translate(40px, 0); opacity: 0; }
    }
    .ember { animation: em 18s linear infinite; }
    @keyframes em {
      0%, 82% { transform: translate(0, 0); opacity: 0; }
      82.5% { transform: translate(0, 0); opacity: 1; }
      88%  { transform: translate(0, 11px); opacity: 1; }
      90.5%, 100% { transform: translate(0, 13px); opacity: 0; }
    }
    .gGreen { animation: gg 18s linear infinite; }
    @keyframes gg {
      0%, 18% { opacity: 0; } 19.333%, 23.333% { opacity: 1; } 26.667%, 48% { opacity: 0; }
      49.333%, 53.333% { opacity: 1; } 56.667%, 100% { opacity: 0; }
    }
    .gRed { animation: gr 18s linear infinite; }
    @keyframes gr {
      0%, 78% { opacity: 0; } 79.333%, 83.333% { opacity: 1; } 86%, 100% { opacity: 0; }
    }
    .streak { animation: st 18s linear infinite; }
    @keyframes st {
      0%, 21.333% { transform: translate(0, 0); opacity: 0; }
      22.667% { transform: translate(0, 0); opacity: 1; }
      26.667% { transform: translate(0, -5px); opacity: 1; }
      28% { transform: translate(0, -5px); opacity: 0; }
      51.333% { transform: translate(0, 0); opacity: 0; }
      52.667% { transform: translate(0, 0); opacity: 1; }
      56.667% { transform: translate(0, -5px); opacity: 1; }
      58%, 100% { transform: translate(0, -5px); opacity: 0; }
    }
    .sA1 { animation: sa1 18s linear infinite; }
    @keyframes sa1 { 0%, 26% { opacity: 0; } 26.667%, 28.667% { opacity: 1; } 30.667%, 100% { opacity: 0; } }
    .sA2 { animation: sa2 18s linear infinite; }
    @keyframes sa2 { 0%, 28.667% { opacity: 0; } 30.667%, 100% { opacity: 0.9; } }
    .sB1 { animation: sb1 18s linear infinite; }
    @keyframes sb1 { 0%, 56% { opacity: 0; } 56.667%, 58.667% { opacity: 1; } 60.667%, 100% { opacity: 0; } }
    .sB2 { animation: sb2 18s linear infinite; }
    @keyframes sb2 { 0%, 58.667% { opacity: 0; } 60.667%, 100% { opacity: 0.9; } }
    .sC1 { animation: sc1 18s linear infinite; }
    @keyframes sc1 { 0%, 88% { opacity: 0; } 88.5%, 91% { opacity: 1; } 93%, 100% { opacity: 0; } }
    .sC2 { animation: sc2 18s linear infinite; }
    @keyframes sc2 { 0%, 91% { opacity: 0; } 93%, 100% { opacity: 0.9; } }
    .chamber { animation: ch 18s linear infinite; }
    @keyframes ch {
      0%, 23% { opacity: 0; } 24.667%, 33.333% { opacity: 1; } 38.667%, 53% { opacity: 0; }
      54.667%, 63.333% { opacity: 1; } 68.667%, 100% { opacity: 0; }
    }
    .riseGlow { animation: rg 18s linear infinite; }
    @keyframes rg {
      0%, 3.7% { opacity: 1; } 5%, 29.4% { opacity: 0; } 30%, 33.7% { opacity: 1; }
      35%, 59.4% { opacity: 0; } 60%, 63.7% { opacity: 1; } 65%, 100% { opacity: 0; }
    }
    .lamp { animation: lp 18s linear infinite; }
    @keyframes lp {
      0%, 26% { opacity: 0; } 26.667%, 29.7% { opacity: 1; } 30.4%, 56% { opacity: 0; }
      56.667%, 59.7% { opacity: 1; } 60.4%, 96% { opacity: 0; } 96.667%, 100% { opacity: 1; }
    }
    .bitA { animation: ba 3s linear infinite; }
    @keyframes ba { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .bitB { animation: bb 4.5s linear infinite; animation-delay: -2s; }
    @keyframes bb { 0%, 49% { opacity: 0; } 50%, 100% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .pA, .pB, .pC, .ember, .streak { display: none; } }
  </style>
  <defs>
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>
  <!-- main pipe, extended across the full strip -->
  <rect x="0" y="20" width="52" height="1" fill="#96a0b4"/>
  <rect x="0" y="21" width="52" height="2" fill="#111d3a"/>
  <rect x="0" y="23" width="52" height="1" fill="#2c3240"/>
