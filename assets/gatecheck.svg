      <rect x="43" y="9" width="3" height="1" fill="#2c3240"/>
      <rect x="42" y="10" width="5" height="1" fill="#2c3240"/>
      <rect x="41" y="11" width="7" height="1" fill="#2c3240"/>
      <rect x="40" y="12" width="9" height="2" fill="#2c3240"/>
